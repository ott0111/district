<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="404 — Page not found on District.">
  <meta name="theme-color" content="#050505">
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <div id="site-nav"></div>

  <main id="main">
    <!-- 404 Error Page -->
    <section class="error-page" aria-labelledby="error-title">
      <div class="error-page__code reveal">404</div>
      <h1 class="error-page__title reveal" id="error-title">Page not found.</h1>
      <p class="error-page__desc reveal">The page you're looking for doesn't exist or has been moved.</p>
      <div class="hero__actions reveal">
        <a href="index.html" class="btn btn--primary btn--lg magnetic" data-magnetic>
          <span>Go Home</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script src="js/components.js" defer></script>
  <script src="js/script.js" defer></script>
</body>
</html>
