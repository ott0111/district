<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Coming Soon — Something exciting is on the way from District.">
  <meta name="theme-color" content="#050505">
  <title>Coming Soon — District</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header Banner -->
  <div id="site-header-banner"></div>

  <!-- Navigation -->
  <div id="site-nav"></div>

  <main id="main">
    <!-- Coming Soon Page -->
    <section class="coming-soon" aria-labelledby="coming-soon-title">
      <div class="coming-soon__icon reveal">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="error-page__title reveal" id="coming-soon-title">Coming Soon.</h1>
      <p class="error-page__desc reveal">Something exciting is on the way. Stay tuned.</p>
      <div class="hero__actions reveal">
        <a href="index.html" class="btn btn--primary btn--lg magnetic" data-magnetic>
          <span>Back to Home</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script src="js/components.js" defer></script>
  <script src="js/script.js" defer></script>
</body>
</html>
